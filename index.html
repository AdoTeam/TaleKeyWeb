<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tale HUB</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f1a;
    color:white;
    overflow:hidden;
}

/* HEADER */
.header{
    text-align:center;
    margin-top:25px;
    font-size:44px;
    font-weight:bold;
}

.header span:nth-child(1){color:#4db8ff;}
.header span:nth-child(2){color:#66ccff;}
.header span:nth-child(3){color:#33ffcc;}
.header span:nth-child(4){color:#66ff99;}
.header span:nth-child(5){color:#aaff66;}
.header span:nth-child(6){color:#ffee66;}

/* MAIN BUTTON */
#openBtn{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:14px 45px;
    border:none;
    border-radius:12px;
    background:#1f2a44;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

#openBtn:hover{
    background:#2e3f66;
}

/* OVERLAY */
#overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
}

/* CENTER PANEL */
.panel{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.8);
    width:420px;
    background:#0f1629;
    border-radius:18px;
    padding:25px;
    opacity:0;
    transition:0.4s;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.panel.active{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    margin-top:10px;
    background:#1a2440;
    color:white;
}

/* BUTTON STYLE */
.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#243356;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#31446f;
}

/* TASK BOX */
.taskBox{
    margin-top:15px;
    background:#121c33;
    padding:15px;
    border-radius:14px;
}

/* TIMER */
#timer{
    margin-top:10px;
    color:#66ffcc;
}

/* THEME BUTTON */
#themeBtn{
    position:absolute;
    top:15px;
    right:15px;
    padding:10px 15px;
    border-radius:12px;
    border:none;
    background:#1f2a44;
    color:white;
    cursor:pointer;
}

/* THEME PANEL */
.themePanel{
    position:absolute;
    right:-200px;
    top:60px;
    width:180px;
    background:#111a2e;
    border-radius:14px;
    padding:10px;
    transition:0.4s;
}

.themePanel.active{
    right:10px;
}

.themeBtn{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:8px;
    cursor:pointer;
}

.blue{background:#1f3b73;}
.dark{background:#0b0f1a;}
.green{background:#1f4d3a;}
.purple{background:#2d1f4d;}

</style>
</head>

<body>

<div class="header">
    <span>T</span><span>a</span><span>l</span><span>e</span><span> </span><span>HUB</span>
</div>

<button id="themeBtn" onclick="toggleTheme()">🎨 Theme</button>

<div id="overlay"></div>

<div class="panel" id="panel">

    <h3>Key System</h3>

    <input id="username" placeholder="Ana Roblox Adınızı Giriniz">

    <button class="btn" onclick="confirmUser()">Onayla</button>

    <div class="taskBox" id="taskBox" style="display:none">

        <button class="btn" onclick="task()">Görev Başlat</button>

        <p id="timer"></p>

        <button class="btn" id="keyBtn" disabled onclick="generateKey()">
            Key Oluştur
        </button>

        <div id="keyBox"></div>

    </div>

</div>

<div class="themePanel" id="themePanel">

    <button class="themeBtn blue" onclick="setTheme('#0b1b3a')">Mavi</button>
    <button class="themeBtn dark" onclick="setTheme('#0b0f1a')">Siyah</button>
    <button class="themeBtn green" onclick="setTheme('#0c2b22')">Yeşil</button>
    <button class="themeBtn purple" onclick="setTheme('#1a1230')">Mor</button>

</div>

<button id="openBtn" onclick="openPanel()">Get Key</button>

<script>

let username="";
let time=60;
let done=false;

function openPanel(){
    document.getElementById("panel").classList.add("active");
    document.getElementById("overlay").style.display="block";
    document.getElementById("openBtn").style.display="none";
}

function confirmUser(){
    let u=document.getElementById("username").value;
    if(!u){alert("Ad gir");return;}

    username=u;
    document.getElementById("taskBox").style.display="block";
}

function task(){

    window.open("https://youtube.com","_blank");

    let t=time;

    let interval=setInterval(()=>{

        document.getElementById("timer").innerText=
        "Süre: "+t+"s";

        t--;

        if(t<0){
            clearInterval(interval);
            done=true;
            document.getElementById("keyBtn").disabled=false;
            document.getElementById("timer").innerText="Tamamlandı";
        }

    },1000);
}

function generateKey(){

    let date=new Date().toISOString().slice(0,10).replaceAll("-","");

    let mix="";

    let max=Math.max(username.length,date.length);

    for(let i=0;i<max;i++){
        if(username[i]) mix+=username[i];
        if(date[i]) mix+=date[i];
    }

    document.getElementById("keyBox").innerText=
    "KEY: "+btoa(mix).substring(0,24).toUpperCase();
}

/* THEME */
function toggleTheme(){
    document.getElementById("themePanel").classList.toggle("active");
}

function setTheme(color){
    document.body.style.background=color;
}

</script>

</body>
</html>
