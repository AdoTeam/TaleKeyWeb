<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tale HUB</title>

<style>
body{
    margin:0;
    font-family:Arial;
    transition:0.3s;
    overflow-x:hidden;
}

/* HEADER */
.header{
    text-align:center;
    margin-top:25px;
    font-size:60px;
    font-weight:900;
}

.header span:nth-child(1){color:#4db8ff;}
.header span:nth-child(2){color:#66ccff;}
.header span:nth-child(3){color:#33ffcc;}
.header span:nth-child(4){color:#66ff99;}
.header span:nth-child(5){color:#aaff66;}
.header span:nth-child(6){color:#ffee66;}

/* CARD */
.card{
    width:420px;
    margin:60px auto;
    padding:20px;
    border-radius:18px;
    transition:0.3s;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    margin-top:10px;
}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* TASK ROW */
.task{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.05);
    padding:12px;
    border-radius:12px;
    margin-top:8px;
}

.task button{
    width:auto;
    padding:8px 12px;
    border-radius:10px;
}

/* RIGHT TIME */
.time{
    min-width:60px;
    text-align:right;
    font-weight:bold;
}

.check{
    color:#00ff99;
}

/* FEATURES */
.features{
    width:80%;
    margin:60px auto;
    padding:25px;
    border-radius:18px;
    transition:0.3s;
}

.features h2{
    text-align:center;
}

.features li{
    padding:8px;
    margin:6px 0;
    border-radius:10px;
    list-style:none;
}

/* THEMES */
.white-body{background:#f2f2f2;color:black;}
.black-body{background:#0b0f1a;color:white;}
.navy-body{background:#0a1a33;color:white;}
.sapphire-body{background:#0f2d52;color:white;}

.white-card{background:white;}
.black-card{background:#0f1629;}
.navy-card{background:#0f1f3a;}
.sapphire-card{background:#12345f;}

.white-feat{background:#fff;color:black;}
.black-feat{background:#0f1629;color:white;}
.navy-feat{background:#0c1c35;color:white;}
.sapphire-feat{background:#0f2a4d;color:white;}

/* KEY GREEN */
.key-success{
    color:#00ff99;
    font-weight:bold;
    margin-top:10px;
}

</style>
</head>

<body class="black-body">

<div class="header">
    <span>T</span><span>a</span><span>l</span><span>e</span><span> </span><span>HUB</span>
</div>

<div class="card black-card" id="card">

    <div id="userBox">
        <h3>Enter your Roblox Username</h3>
        <input id="username" placeholder="Your Roblox Name">
        <button class="btn" onclick="confirmUser()">Confirm</button>
    </div>

    <div id="taskBox" style="display:none">

        <h3>Tasks</h3>

        <div class="task">
            <button onclick="task(0)">Youtube Subscribe</button>
            <div class="time" id="t0">20</div>
        </div>

        <div class="task">
            <button onclick="task(1)">Youtube Watch a video</button>
            <div class="time" id="t1">20</div>
        </div>

        <div class="task">
            <button onclick="task(2)">Youtube like a video</button>
            <div class="time" id="t2">20</div>
        </div>

        <button class="btn" id="keyBtn" disabled onclick="generateKey()">
            Get Key
        </button>

        <div id="keyBox"></div>
        <button class="btn" id="copyBtn" style="display:none;" onclick="copyKey()">
            Copy Key
        </button>

    </div>
</div>

<div class="features black-feat" id="features">
    <h2>Tale Plus Features</h2>
    <ul>
        <li>-unlock Config Loader</li>
        <li>-Unlock AimBot Settings</li>
        <li>-Unlock PvP config loader</li>
        <li>-Unlock UI Features</li>
        <li>-Anti-Cheat Bypass</li>
        <li>coming soon......</li>

    </ul>
</div>

<script>

let username="";
let done=[false,false,false];

function confirmUser(){
    username=document.getElementById("username").value;
    if(!username) return;

    document.getElementById("userBox").style.display="none";
    document.getElementById("taskBox").style.display="block";
}

function task(i){

    window.open("https://youtube.com","_blank");

    let el=document.getElementById("t"+i);
    let t=parseInt(el.innerText);

    let interval=setInterval(()=>{

        if(t>0){
            el.innerText=t;
            t--;
        }else{
            clearInterval(interval);
            el.innerHTML="✔";
            el.classList.add("check");
            done[i]=true;
            checkAll();
        }

    },1000);
}

function checkAll(){
    if(done.every(v=>v===true)){
        document.getElementById("keyBtn").disabled=false;
    }
}

function generateKey(){

    let date = new Date().toISOString().slice(0,10).replaceAll("-","");

    let alphabetValue = "";

    for(let i = 0; i < username.length; i++){

        let char = username[i].toUpperCase();

        if(char >= "A" && char <= "Z"){
            alphabetValue += (char.charCodeAt(0) - 64);
        }else{
            alphabetValue += char;
        }
    }

    let key = "FREE_" + alphabetValue + "_" + date;

    let box = document.getElementById("keyBox");
    box.innerText = key;
    box.classList.add("key-success");

    document.getElementById("copyBtn").style.display = "block";
}

</script>

</body>
</html>
