<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tale HUB</title>

<style>
body{
    margin:0;
    font-family:Arial;
    transition:0.3s;
    overflow-x:hidden;
}

/* HEADER */
.header{
    text-align:center;
    margin-top:25px;
    font-size:60px;
    font-weight:900;
}

.header span:nth-child(1){color:#4db8ff;}
.header span:nth-child(2){color:#66ccff;}
.header span:nth-child(3){color:#33ffcc;}
.header span:nth-child(4){color:#66ff99;}
.header span:nth-child(5){color:#aaff66;}
.header span:nth-child(6){color:#ffee66;}

/* CARD */
.card{
    width:420px;
    margin:60px auto;
    padding:20px;
    border-radius:18px;
    transition:0.3s;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    margin-top:10px;
}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* TASK ROW */
.task{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.05);
    padding:12px;
    border-radius:12px;
    margin-top:8px;
}

.task button{
    width:auto;
    padding:8px 12px;
    border-radius:10px;
}

/* RIGHT TIME */
.time{
    min-width:60px;
    text-align:right;
    font-weight:bold;
}

.check{
    color:#00ff99;
}

/* FEATURES */
.features{
    width:80%;
    margin:60px auto;
    padding:25px;
    border-radius:18px;
    transition:0.3s;
}

.features h2{
    text-align:center;
}

.features li{
    padding:8px;
    margin:6px 0;
    border-radius:10px;
    list-style:none;
}

/* THEMES */
.white-body{background:#f2f2f2;color:black;}
.black-body{background:#0b0f1a;color:white;}
.navy-body{background:#0a1a33;color:white;}
.sapphire-body{background:#0f2d52;color:white;}

.white-card{background:white;}
.black-card{background:#0f1629;}
.navy-card{background:#0f1f3a;}
.sapphire-card{background:#12345f;}

.white-feat{background:#fff;color:black;}
.black-feat{background:#0f1629;color:white;}
.navy-feat{background:#0c1c35;color:white;}
.sapphire-feat{background:#0f2a4d;color:white;}

/* KEY GREEN */
.key-success{
    color:#00ff99;
    font-weight:bold;
    margin-top:10px;
}

</style>
</head>

<body class="black-body">

<div class="header">
    <span>T</span><span>a</span><span>l</span><span>e</span><span> </span><span>HUB</span>
</div>

<div class="card black-card" id="card">

    <div id="userBox">
        <h3>Enter your Roblox Username</h3>
        <input id="username" placeholder="Your Roblox Name">
        <button class="btn" onclick="confirmUser()">Confirm</button>
    </div>

    <div id="taskBox" style="display:none">

        <h3>Tasks</h3>

        <div class="task">
            <button onclick="task(0)">Task 1</button>
            <div class="time" id="t0">60</div>
        </div>

        <div class="task">
            <button onclick="task(1)">Task 2</button>
            <div class="time" id="t1">70</div>
        </div>

        <div class="task">
            <button onclick="task(2)">Task 3</button>
            <div class="time" id="t2">80</div>
        </div>

        <button class="btn" id="keyBtn" disabled onclick="generateKey()">
            Generate Key
        </button>

        <div id="keyBox"></div>
        <button class="btn" id="copyBtn" style="display:none;" onclick="copyKey()">
            Copy Key
        </button>

    </div>
</div>

<div class="features black-feat" id="features">
    <h2>Tale Plus Features</h2>
    <ul>
        <li>Advanced Authentication System</li>
        <li>Multi Layer Task Verification</li>
        <li>Daily Key Rotation Engine</li>
        <li>Secure Session Handler</li>
        <li>Anti Tamper Interface</li>
        <li>Fast Response Gateway</li>
        <li>ASDFGHJKJHGFDSASDFGHJ</li>

    </ul>
</div>

<script>

let username="";
let done=[false,false,false];

function confirmUser(){
    username=document.getElementById("username").value;
    if(!username) return;

    document.getElementById("userBox").style.display="none";
    document.getElementById("taskBox").style.display="block";
}

function task(i){

    window.open("https://youtube.com","_blank");

    let el=document.getElementById("t"+i);
    let t=parseInt(el.innerText);

    let interval=setInterval(()=>{

        if(t>0){
            el.innerText=t;
            t--;
        }else{
            clearInterval(interval);
            el.innerHTML="✔";
            el.classList.add("check");
            done[i]=true;
            checkAll();
        }

    },1000);
}

function checkAll(){
    if(done.every(v=>v===true)){
        document.getElementById("keyBtn").disabled=false;
    }
}

function generateKey(){

    let date=new Date().toISOString().slice(0,10).replaceAll("-","");

    let mix="";
    let max=Math.max(username.length,date.length);

    for(let i=0;i<max;i++){
        if(username[i]) mix+=username[i];
        if(date[i]) mix+=date[i];
    }

    let key="KEY: "+btoa(mix).substring(0,26).toUpperCase();

    let box=document.getElementById("keyBox");
    box.innerText=key;
    box.classList.add("key-success");

    document.getElementById("copyBtn").style.display="block";
}

function copyKey(){
    let text=document.getElementById("keyBox").innerText;
    navigator.clipboard.writeText(text);
}

</script>

</body>
</html>
