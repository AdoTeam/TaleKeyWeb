<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tale HUB</title>

<style>
body{
    margin:0;
    font-family:Arial;
    transition:0.3s;
    overflow-x:hidden;
}

/* NEON TITLE */
.header{
    text-align:center;
    margin-top:25px;
    font-size:62px;
    font-weight:900;
    letter-spacing:3px;
    color:#00eaff;
    text-shadow:
        0 0 5px #00eaff,
        0 0 10px #00eaff,
        0 0 20px #00bfff,
        0 0 40px #0088ff;
}

/* CARD */
.card{
    width:420px;
    margin:50px auto;
    padding:20px;
    border-radius:18px;
    background:#0f1629;
    transition:0.3s;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    margin-top:10px;
    background:#1a2440;
    color:white;
}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#243356;
    color:white;
}

/* TASK ROW */
.task{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    margin-top:8px;
    border-radius:12px;
    background:rgba(255,255,255,0.05);
    transition:0.3s;
}

.task button{
    padding:8px 12px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    background:#2a3c66;
    color:white;
}

/* COMPLETED TASK COLOR */
.done{
    background:#00bcd4 !important;
    color:black;
    box-shadow:0 0 12px #00eaff;
}

/* TIME */
.time{
    min-width:60px;
    text-align:right;
    font-weight:bold;
}

/* KEY SCREEN */
#keyScreen{
    display:none;
    text-align:center;
    margin-top:20px;
}

#keyBox{
    font-size:22px;
    margin:15px 0;
    color:#00ff99;
    word-break:break-all;
}

/* COPY BUTTON */
.copyBtn{
    padding:10px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#00eaff;
    color:black;
    font-weight:bold;
}

/* FEATURES */
.features{
    width:80%;
    margin:60px auto;
    padding:25px;
    border-radius:18px;
    background:#0f1629;
}

.features h2{
    text-align:center;
}

.features li{
    list-style:none;
    padding:8px;
    margin:6px 0;
    background:#121c33;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="header">Tale HUB</div>

<div class="card">

    <div id="userBox">
        <h3>Enter Roblox Username</h3>
        <input id="username" placeholder="Your Roblox Name">
        <button class="btn" onclick="start()">Confirm</button>
    </div>

    <div id="taskBox" style="display:none">

        <h3>Tasks</h3>

        <div class="task" id="task0">
            <button onclick="task(0)">Task 1</button>
            <div class="time" id="t0">60</div>
        </div>

        <div class="task" id="task1">
            <button onclick="task(1)">Task 2</button>
            <div class="time" id="t1">70</div>
        </div>

        <div class="task" id="task2">
            <button onclick="task(2)">Task 3</button>
            <div class="time" id="t2">80</div>
        </div>

    </div>

    <!-- KEY SCREEN -->
    <div id="keyScreen">
        <h2>Your Key</h2>
        <div id="keyBox">XXXXX-XXXXX-XXXXX</div>
        <button class="copyBtn" onclick="copyKey()">Copy Key</button>
    </div>

</div>

<script>

let username="";
let done=[false,false,false];

function start(){
    username=document.getElementById("username").value;
    if(!username) return;

    document.getElementById("userBox").style.display="none";
    document.getElementById("taskBox").style.display="block";
}

function task(i){

    window.open("https://youtube.com","_blank");

    let el=document.getElementById("t"+i);
    let box=document.getElementById("task"+i);

    let t=parseInt(el.innerText);

    let interval=setInterval(()=>{

        if(t>0){
            el.innerText=t;
            t--;
        }else{
            clearInterval(interval);

            el.innerHTML="✔";
            box.classList.add("done");

            done[i]=true;

            checkAll();
        }

    },1000);
}

function checkAll(){

    if(done.every(v=>v===true)){
        generateKey();
    }
}

function generateKey(){

    let date=new Date().toISOString().slice(0,10).replaceAll("-","");

    let mix="";
    let max=Math.max(username.length,date.length);

    for(let i=0;i<max;i++){
        if(username[i]) mix+=username[i];
        if(date[i]) mix+=date[i];
    }

    let key=btoa(mix).substring(0,24).toUpperCase();

    document.getElementById("taskBox").style.display="none";
    document.getElementById("keyScreen").style.display="block";

    document.getElementById("keyBox").innerText=key;
}

function copyKey(){
    let text=document.getElementById("keyBox").innerText;
    navigator.clipboard.writeText(text);
    alert("Key copied!");
}

</script>

</body>
</html>
