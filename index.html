<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tale HUB Key System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    overflow:hidden;
}

/* HEADER */
.header{
    text-align:center;
    margin-top:20px;
    font-size:42px;
    font-weight:bold;
}

.header span:nth-child(1){color:#00aaff;}
.header span:nth-child(2){color:#00ccff;}
.header span:nth-child(3){color:#00ffcc;}
.header span:nth-child(4){color:#00ff99;}
.header span:nth-child(5){color:#aaff00;}
.header span:nth-child(6){color:#ffff66;}

/* bottom button */
#mainBtn{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
}

/* RIGHT PANEL */
.panel{
    position:absolute;
    right:-350px;
    top:0;
    width:300px;
    height:100%;
    background:#1b1b1b;
    padding:20px;
    transition:0.4s;
}

.panel.active{
    right:0;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    padding:10px;
    margin-top:10px;
    cursor:pointer;
    width:100%;
}

/* TASK AREA */
.task{
    margin-top:20px;
    display:none;
}

.task button{
    margin-top:8px;
}

#keyBox{
    margin-top:15px;
    color:#00ff99;
    font-size:18px;
}

/* theme button */
#themeBtn{
    position:absolute;
    top:10px;
    right:10px;
}
</style>
</head>

<body>

<div class="header">
    <span>T</span><span>a</span><span>l</span><span>e</span><span> </span><span>HUB</span>
</div>

<button id="themeBtn" onclick="changeBg()">🎨</button>

<button id="mainBtn" onclick="openPanel()">Get Key</button>

<!-- RIGHT PANEL -->
<div class="panel" id="panel">

    <h3>Login</h3>

    <input id="username" placeholder="Ana Roblox Adınızı Giriniz">

    <button onclick="confirmUser()">Onayla</button>

    <div class="task" id="taskArea">

        <h3>Görevler</h3>

        <button onclick="task(1)">Task 1</button>
        <button onclick="task(2)">Task 2</button>
        <button onclick="task(3)">Task 3</button>

        <p id="timer"></p>

        <button id="keyBtn" disabled onclick="generateKey()">
            Key Oluştur
        </button>

        <div id="keyBox"></div>

    </div>
</div>

<script>

let username="";
let completed=[false,false,false];
let time=[30,40,50]; // her görev farklı süre

function openPanel(){
    document.getElementById("mainBtn").style.display="none";
    document.getElementById("panel").classList.add("active");
}

function confirmUser(){
    let u=document.getElementById("username").value;
    if(!u){alert("İsim gir");return;}

    username=u;
    document.getElementById("taskArea").style.display="block";
}

function task(id){

    window.open("https://youtube.com","_blank");

    let i=id-1;
    let t=time[i];

    let interval=setInterval(()=>{

        document.getElementById("timer").innerText=
        "Task "+id+" - "+t+"s";

        t--;

        if(t<0){
            clearInterval(interval);
            completed[i]=true;
            checkAll();
        }

    },1000);
}

function checkAll(){

    if(completed.every(v=>v===true)){
        document.getElementById("keyBtn").disabled=false;
        document.getElementById("timer").innerText="Tüm görevler tamam!";
    }
}

function generateKey(){

    let date=new Date().toISOString().slice(0,10).replaceAll("-","");

    let mix="";

    let max=Math.max(username.length,date.length);

    for(let i=0;i<max;i++){
        if(username[i]) mix+=username[i];
        if(date[i]) mix+=date[i];
    }

    document.getElementById("keyBox").innerText=
    "KEY: "+btoa(mix).substring(0,25).toUpperCase();
}

let colors=["#111","#1a1a2e","#0f3460","#16213e","#000"];

function changeBg(){
    document.body.style.background=
    colors[Math.floor(Math.random()*colors.length)];
}

</script>

</body>
</html>
