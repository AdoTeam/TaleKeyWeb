<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tale HUB</title>

<style>
body{
    margin:0;
    font-family:Arial;
    transition:0.3s;
    overflow-x:hidden;
}

/* NEON TITLE (CLEAN) */
.header{
    text-align:center;
    margin-top:25px;
    font-size:60px;
    font-weight:900;
    letter-spacing:2px;
    color:#00d9ff;
    text-shadow:0 0 10px #00d9ff;
}

/* CARD */
.card{
    width:420px;
    margin:60px auto;
    padding:20px;
    border-radius:18px;
    transition:0.3s;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    margin-top:10px;
}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* TASK */
.task{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    margin-top:8px;
    border-radius:12px;
    background:rgba(255,255,255,0.05);
    transition:0.3s;
}

/* TASK DONE HIGHLIGHT */
.done{
    background:#00c8d7 !important;
    color:black;
}

/* TIME */
.time{
    min-width:60px;
    text-align:right;
    font-weight:bold;
}

/* KEY SCREEN */
#keyScreen{
    display:none;
    text-align:center;
}

#keyBox{
    font-size:20px;
    margin:15px 0;
    color:#00ff99;
    word-break:break-all;
}

.copyBtn{
    padding:10px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* THEMES */
.white{background:#f2f2f2;color:black;}
.black{background:#0b0f1a;color:white;}
.navy{background:#0a1a33;color:white;}
.sapphire{background:#0f2d52;color:white;}

</style>
</head>

<body class="black">

<div class="header">Tale HUB</div>

<div class="card" id="card">

    <div id="userBox">
        <h3>Enter Roblox Username</h3>
        <input id="username" placeholder="Roblox Name">
        <button class="btn" onclick="start()">Confirm</button>
    </div>

    <div id="taskBox" style="display:none">

        <h3>Tasks</h3>

        <div class="task" id="t0">
            <button onclick="task(0)">Task 1</button>
            <div class="time">60</div>
        </div>

        <div class="task" id="t1">
            <button onclick="task(1)">Task 2</button>
            <div class="time">70</div>
        </div>

        <div class="task" id="t2">
            <button onclick="task(2)">Task 3</button>
            <div class="time">80</div>
        </div>

    </div>

    <div id="keyScreen">
        <h2>Your Key</h2>
        <div id="keyBox"></div>
        <button class="copyBtn" onclick="copyKey()">Copy</button>
    </div>

</div>

<script>

let username="";
let done=[false,false,false];

function start(){
    username=document.getElementById("username").value;
    if(!username) return;

    document.getElementById("userBox").style.display="none";
    document.getElementById("taskBox").style.display="block";
}

function task(i){

    window.open("https://youtube.com","_blank");

    let el=document.querySelectorAll(".task")[i];
    let timeEl=el.querySelector(".time");

    let t=parseInt(timeEl.innerText);

    let interval=setInterval(()=>{

        t--;
        timeEl.innerText=t;

        if(t<=0){
            clearInterval(interval);

            timeEl.innerText="✔";
            el.classList.add("done");

            done[i]=true;
            check();
        }

    },1000);
}

function check(){
    if(done.every(v=>v)){
        showKey();
    }
}

function showKey(){

    let date=new Date().toISOString().slice(0,10).replaceAll("-","");

    let mix="";
    let max=Math.max(username.length,date.length);

    for(let i=0;i<max;i++){
        if(username[i]) mix+=username[i];
        if(date[i]) mix+=date[i];
    }

    let key=btoa(mix).substring(0,24).toUpperCase();

    document.getElementById("taskBox").style.display="none";
    document.getElementById("keyScreen").style.display="block";

    document.getElementById("keyBox").innerText=key;
}

function copyKey(){
    navigator.clipboard.writeText(document.getElementById("keyBox").innerText);
    alert("Copied!");
}

</script>

</body>
</html>
