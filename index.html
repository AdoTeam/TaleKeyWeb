<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tale HUB Key System</title>

<style>
body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    padding-top:40px;
}

.title{
    font-size:40px;
    font-weight:bold;
    background: linear-gradient(90deg, red, yellow, green, cyan, blue, magenta);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.box{
    margin-top:20px;
}

input{
    padding:10px;
    width:200px;
    border-radius:6px;
    border:none;
}

button{
    padding:10px;
    margin:5px;
    cursor:pointer;
}

.task{
    display:none;
    margin-top:20px;
}

#keyBox{
    margin-top:20px;
    font-size:20px;
    color:#00ff99;
}
</style>
</head>

<body>

<div class="title">Tale HUB</div>
<h3>Key System</h3>

<div class="box">
    <input id="username" placeholder="Adını yaz">
    <button onclick="startSystem()">✔</button>
</div>

<div class="task" id="taskArea">

    <h3>Görevler</h3>

    <button onclick="openTask(1)">Görev 1 (YouTube)</button>
    <button onclick="openTask(2)">Görev 2 (YouTube)</button>
    <button onclick="openTask(3)">Görev 3 (YouTube)</button>

    <p id="timer"></p>

    <button id="genBtn" disabled onclick="generateKey()">
        Key Oluştur
    </button>

    <div id="keyBox"></div>
</div>

<script>

let time = 95;
let finished = false;
let usernameGlobal = "";

// kullanıcı başlat
function startSystem(){
    let name = document.getElementById("username").value;

    if(!name){
        alert("Ad gir");
        return;
    }

    usernameGlobal = name;

    document.getElementById("taskArea").style.display = "block";
}

// görev aç
function openTask(id){
    window.open("https://youtube.com", "_blank");

    if(finished) return;

    let interval = setInterval(() => {

        document.getElementById("timer").innerText =
            time + " saniye kaldı";

        time--;

        if(time < 0){
            clearInterval(interval);

            document.getElementById("timer").innerText =
                "Hazır!";

            document.getElementById("genBtn").disabled = false;

            finished = true;
        }

    }, 1000);
}

// basit "karıştırma key"
function generateKey(){

    let name = usernameGlobal.toUpperCase();
    let date = new Date().toISOString().slice(0,10).replaceAll("-","");

    let mixed = "";

    let max = Math.max(name.length, date.length);

    for(let i=0;i<max;i++){

        if(name[i]) mixed += name[i];
        if(date[i]) mixed += date[i];
    }

    let finalKey =
        btoa(mixed).substring(0,24).toUpperCase();

    document.getElementById("keyBox").innerText =
        "KEY: " + finalKey;
}

</script>

</body>
</html>
